<!DOCTYPE html>
<html lang="en">
<head>
    <title> Easy Foods </title>
     <link rel="stylesheet" href="index.css">
</head>
<body>

<div style="padding: 1rem 5% 3rem;">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fas fa-crown" style="font-size: 2.2rem; color: #bf4eff;"></i>
            <div>
                <h1 style="font-size: 1.8rem; background: linear-gradient(135deg, #fff, #bf4eff); -webkit-background-clip: text; background-clip: text; color: transparent;">Easy Foods Admin</h1>
                <p style="opacity: 0.7; font-size: 0.85rem;">Manage Menu & Track Orders</p>
            </div>
        </div>
        <a href="user_panel.html" style="background: rgba(191,78,255,0.2); border: 1px solid #bf4eff; border-radius: 40px; padding: 10px 24px; color: white; text-decoration: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;">
            <i class="fas fa-store"></i> Back to Store
        </a>
    </div>

    <!-- Stats Cards -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
        <div class="stats-card">
            <i class="fas fa-utensils" style="font-size: 2rem; color: #bf4eff; margin-bottom: 0.5rem;"></i>
            <h3 id="totalFoods" style="font-size: 2rem;">0</h3>
            <p>Total Food Items</p>
        </div>
        <div class="stats-card">
            <i class="fas fa-shopping-cart" style="font-size: 2rem; color: #bf4eff; margin-bottom: 0.5rem;"></i>
            <h3 id="totalOrders" style="font-size: 2rem;">0</h3>
            <p>Total Orders</p>
        </div>
        <div class="stats-card">
            <i class="fas fa-rupee-sign" style="font-size: 2rem; color: #bf4eff; margin-bottom: 0.5rem;"></i>
            <h3 id="totalRevenue" style="font-size: 2rem;">0</h3>
            <p>Total Revenue</p>
        </div>
    </div>

    <!-- Tabs -->
    <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
        <button class="tab-btn active" id="tabAddBtn">➕ Add New Food</button>
        <button class="tab-btn" id="tabManageBtn">📋 Manage Menu</button>
        <button class="tab-btn" id="tabOrdersBtn">📦 View Orders</button>
    </div>

    <!-- Add Food Section -->
    <div id="addTab" class="glass-card" style="padding: 1.8rem;">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-plus-circle"></i> Add New Food Item</h3>
        <div style="margin-top: 1rem;">
            <input type="text" id="foodName" placeholder="Food Name *" autocomplete="off">
            <input type="text" id="foodImage" placeholder="Image URL (e.g., https://picsum.photos/300/200)" value="https://picsum.photos/300/200?random=1">
            <textarea id="foodDesc" rows="2" placeholder="Description (tasty, fresh, delicious...)" style="resize: vertical;"></textarea>
            <input type="number" id="foodPrice" placeholder="Price (₹) *">
            <button id="addFoodBtn" class="btn-primary" style="width: 100%;"><i class="fas fa-upload"></i> Upload Food</button>
        </div>
    </div>

    <!-- Manage Menu Section -->
    <div id="manageTab" class="glass-card" style="padding: 1.5rem; display: none;">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-list-ul"></i> Manage Food Items</h3>
        <div id="adminFoodList" style="margin-top: 1rem;"></div>
    </div>

    <!-- Orders Section -->
    <div id="ordersTab" class="glass-card" style="padding: 1.5rem; display: none;">
        <h3 style="margin-bottom: 1rem;"><i class="fas fa-truck"></i> Customer Orders</h3>
        <div id="ordersListAdmin" style="margin-top: 1rem; max-height: 500px; overflow-y: auto;"></div>
    </div>
</div>
</body>
</html>
